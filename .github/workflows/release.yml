name: Build & Release

# Push a tag like v1.0.0 to trigger a full release build.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Stage 1: create the GitHub Release with release notes ──────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false

  # ── Stage 2: build each platform and upload artifacts ─────────────────────
  build:
    name: Build — ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            script: build:mac
            artifacts: dist/*.dmg

          - name: Windows
            os: windows-latest
            script: build:win
            artifacts: dist/*.exe

          - name: Linux
            os: ubuntu-latest
            script: build:linux
            artifacts: dist/*.AppImage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS: import the Developer ID cert into an ephemeral keychain.
      - name: Import Developer ID certificate
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERTIFICATE }}
          p12-password: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}

      - name: Verify codesigning identity
        if: matrix.os == 'macos-latest'
        run: security find-identity -v -p codesigning

      - name: Build macOS (signed + notarized)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Build (unsigned)
        if: matrix.os != 'macos-latest'
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
